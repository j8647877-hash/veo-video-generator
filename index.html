<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Studio</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .logo {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #7c6af7, #4db6ff);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }

    .logo svg { color: #fff; }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #7c6af7, #4db6ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .tagline {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 36px;
      line-height: 1.5;
    }

    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 12px 20px;
      background: #fff;
      border: 1px solid #dadce0;
      border-radius: 10px;
      color: #3c4043;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, box-shadow 0.15s;
      margin-bottom: 16px;
    }

    .btn-google:hover {
      background: #f8f9fa;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .privacy-note {
      font-size: 0.75rem;
      color: #444;
      line-height: 1.5;
    }

    .error-msg {
      background: #1f0f14;
      border: 1px solid #4a1a28;
      border-radius: 8px;
      padding: 10px 14px;
      color: #f08090;
      font-size: 0.85rem;
      width: 100%;
      margin-bottom: 16px;
      display: none;
      text-align: left;
    }

    .error-msg.visible { display: block; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="23 7 16 12 23 17 23 7"/>
      <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
    </svg>
  </div>
  <h1>AI Studio</h1>
  <p class="tagline">Generate videos and images<br>powered by Google Vertex AI</p>

  <div class="error-msg" id="error-msg"></div>

  <button class="btn-google" id="sign-in-btn">
    <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
      <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
      <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
      <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
      <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
    </svg>
    Sign in with Google
  </button>
  <p class="privacy-note">Sign in with the Google account that has access to your Vertex AI project.</p>
</div>

<script>
  // ── Auth helpers (shared logic — duplicated in each page for zero-build simplicity) ──
  const AUTH = {
    get(k)      { return localStorage.getItem(k); },
    set(k, v)   { localStorage.setItem(k, v); },
    remove(k)   { localStorage.removeItem(k); },
    clear()     {
      ['access_token','id_token','refresh_token','token_expiry','project_id','cors_setup'].forEach(k => localStorage.removeItem(k));
    },
    // Migrate from sessionStorage → localStorage (one-time)
    migrate() {
      ['access_token','id_token','project_id','cors_setup'].forEach(k => {
        const v = sessionStorage.getItem(k);
        if (v) { localStorage.setItem(k, v); sessionStorage.removeItem(k); }
      });
    },
  };
  AUTH.migrate();

  // Consume OAuth fragment returned by /api/callback
  (function () {
    if (!window.location.hash) return;
    const params = new URLSearchParams(window.location.hash.slice(1));
    const token   = params.get('access_token');
    const idToken = params.get('id_token');
    const refresh = params.get('refresh_token');
    const expires = params.get('expires_in');
    const project = params.get('project');
    if (token) {
      AUTH.set('access_token', token);
      if (idToken)  AUTH.set('id_token',   idToken);
      if (refresh)  AUTH.set('refresh_token', refresh);
      if (expires)  AUTH.set('token_expiry', String(Date.now() + Number(expires) * 1000));
      if (project)  AUTH.set('project_id', project);
      history.replaceState(null, '', '/');
      window.location.href = '/dashboard';
    }
  })();

  // If already signed in, skip straight to dashboard
  if (AUTH.get('access_token')) {
    window.location.href = '/dashboard';
  }

  // Surface auth errors from callback redirect
  const err = new URLSearchParams(window.location.search).get('auth_error');
  if (err) {
    const el = document.getElementById('error-msg');
    el.textContent = 'Sign-in failed: ' + err;
    el.classList.add('visible');
    history.replaceState(null, '', '/');
  }

  document.getElementById('sign-in-btn').addEventListener('click', () => {
    window.location.href = '/api/login';
  });
</script>
</body>
</html>
