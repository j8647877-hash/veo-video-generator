<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Social Media & Creative Generator — AI Studio</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 28px;
      border-bottom: 1px solid #1e1e2a;
      background: #0f0f13;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .back-btn { display:flex;align-items:center;gap:6px;color:#666;font-size:.875rem;text-decoration:none;transition:color .2s; }
    .back-btn:hover { color:#e8e8f0; }
    .user-chip { display:flex;align-items:center;gap:8px;background:#1a1a24;border:1px solid #2a2a3a;border-radius:20px;padding:5px 12px;font-size:.82rem;color:#aaa; }
    .user-dot  { width:7px;height:7px;background:#4caf6e;border-radius:50%; }
    .btn-sign-out { background:none;border:none;color:#555;font-size:.78rem;cursor:pointer;font-family:inherit;margin-left:4px;transition:color .2s; }
    .btn-sign-out:hover { color:#e8e8f0; }

    /* ── Page body ── */
    .page-body { flex:1;display:flex;flex-direction:column;align-items:center;padding:40px 20px; }
    .container  { width:100%;max-width:960px;display:flex;flex-direction:column;gap:24px; }

    header { text-align:center; }
    header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #10b981, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
    }
    header p { margin-top:8px;color:#888;font-size:.95rem; }

    /* ── Split Layout for Large Screens ── */
    .split-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }
    @media (min-width: 900px) {
      .split-layout { grid-template-columns: 1fr 1fr; }
    }

    /* ── Cards ── */
    .card { background:#1a1a24;border:1px solid #2a2a3a;border-radius:14px;padding:24px; }
    .card h2 { font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#666;margin-bottom:16px; }

    label { display:block;font-size:.85rem;color:#aaa;margin-bottom:6px; }

    input[type="text"], input[type="number"], textarea, select {
      width:100%;background:#111118;border:1px solid #2e2e42;border-radius:8px;
      color:#e8e8f0;font-size:.95rem;padding:10px 14px;outline:none;
      transition:border-color .2s;font-family:inherit;
    }
    input[type="text"]:focus, input[type="number"]:focus, textarea:focus, select:focus { border-color:#3b82f6; }
    textarea { resize:vertical; }

    .grid-2 { display:grid;grid-template-columns:1fr 1fr;gap:16px; }
    .field  { display:flex;flex-direction:column;gap:6px; }
    .note { font-size:.78rem;color:#555;line-height:1.5;margin-top:4px; }

    .checkbox-field {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }
    .checkbox-field input[type="checkbox"] {
      width: 16px; height: 16px;
      accent-color: #3b82f6;
    }
    .checkbox-field label { margin: 0; display: inline; cursor: pointer; color:#e8e8f0; }

    /* ── Generate button ── */
    .btn-primary {
      width:100%;padding:14px 28px;
      background:linear-gradient(135deg,#10b981,#3b82f6);
      border:none;border-radius:10px;color:#fff;font-size:1rem;font-weight:700;
      cursor:pointer;transition:opacity .2s,transform .1s;letter-spacing:.01em;
      margin-top: 16px;
    }
    .btn-primary:hover:not(:disabled) { opacity:.88; }
    .btn-primary:active:not(:disabled) { transform:scale(.99); }
    .btn-primary:disabled { opacity:.45;cursor:not-allowed; }

    /* ── Error ── */
    .error-box { background:#1f0f14;border:1px solid #4a1a28;border-radius:10px;padding:16px 20px;color:#f08090;font-size:.9rem;line-height:1.5;display:none;margin-top:16px; }
    .error-box.visible { display:block; }
    .error-box strong { color:#ff6080; }

    /* ── Results ── */
    .result-section {
      margin-top: 24px;
      display: none;
    }
    .result-section.visible { display: block; }
    .result-header {
      display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:10px;
    }
    .result-header h3 { font-size:1rem;font-weight:600;color:#e8e8f0;margin:0; }
    .btn-secondary {
      padding:6px 14px;background:#1e1e2e;
      border:1px solid #3a3a54;border-radius:6px;color:#c0c0d8;font-size:.8rem;
      font-weight:500;cursor:pointer;transition:background .2s,border-color .2s;
      font-family:inherit;
    }
    .btn-secondary:hover { background:#1a1a30;border-color:#3b82f6;color:#e8e8f0; }

    /* ── Output Box ── */
    .output-box {
      background:#111118;border:1px solid #2e2e42;border-radius:10px;
      padding:20px 24px;
      font-size:.95rem;line-height:1.6;color:#e0e0f0;
      white-space:pre-wrap;word-break:break-word;
      min-height:120px;
    }

    /* ── Image Display ── */
    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-top: 16px;
    }
    .image-card {
      background: #111118;
      border: 1px solid #2e2e42;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .image-card img {
      width: 100%;
      height: auto;
      object-fit: contain;
      background: #000;
      display: block;
    }
    .image-actions {
      display: flex;
      gap: 8px;
      padding: 12px;
      background: #161620;
      border-top: 1px solid #2e2e42;
    }
    .btn-action {
      flex: 1; padding: 6px 0; background: #262636; border: none; border-radius: 6px;
      color: #e8e8f0; font-size: 0.8rem; font-weight: 500; cursor: pointer; transition: background 0.2s;
    }
    .btn-action:hover { background: #3a3a54; }

    /* ── Reference image upload ── */
    .upload-area {
      border: 2px dashed #2e2e42;
      border-radius: 10px;
      padding: 28px 20px;
      text-align: center;
      cursor: pointer;
      position: relative;
      transition: border-color 0.2s, background 0.2s;
      margin-top: 8px;
    }
    .upload-area:hover { border-color: #3b82f6; background: #1a1a24; }
    .upload-area input[type="file"] {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      opacity: 0; cursor: pointer;
    }
    .upload-icon { font-size: 2rem; margin-bottom: 8px; opacity: 0.8; }
    .upload-text { font-size: 0.95rem; font-weight: 500; color: #e8e8f0; }
    .upload-subtext { font-size: 0.8rem; color: #666; margin-top: 4px; }
    
    .ref-preview { display: none; align-items: flex-start; gap: 16px; text-align: left; }
    .ref-preview img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 1px solid #3a3a54; }
    .ref-preview-info { flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .ref-filename { font-size: 0.85rem; font-weight: 500; color: #e8e8f0; word-break: break-all; }
    .btn-remove-ref { align-self: flex-start; background: none; border: none; color: #f7896a; font-size: 0.8rem; cursor: pointer; padding: 0; transition: color 0.2s; }
    .btn-remove-ref:hover { color: #ff6080; }

    .mode-toggle { display: flex; background: #111118; border: 1px solid #2e2e42; border-radius: 6px; padding: 2px; }
    .mode-toggle button {
      flex: 1; background: none; border: none; color: #888; padding: 4px 8px;
      font-size: 0.75rem; border-radius: 4px; cursor: pointer; transition: background 0.2s, color 0.2s;
    }
    .mode-toggle button.active { background: #262636; color: #e8e8f0; }

    /* Streaming cursor */
    .cursor {
      display:inline-block;width:2px;height:1em;background:#3b82f6;
      vertical-align:text-bottom;animation:blink .7s steps(1) infinite;margin-left:1px;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  </style>
</head>
<body>

<nav class="topbar">
  <a href="/dashboard" class="back-btn">← Dashboard</a>
  <div class="user-chip">
    <span class="user-dot"></span>
    <span id="user-email">…</span>
    <button class="btn-sign-out" id="sign-out-btn">Sign out</button>
  </div>
</nav>

<div class="page-body">
<div class="container">

  <header>
    <h1>Social Media Generator</h1>
    <p>Generate optimized social copy and stunning creatives</p>
  </header>

  <div class="card" style="padding: 16px 24px;">
    <div class="field">
      <label for="project-id" style="margin:0;">Project ID <span style="color:#3b82f6;font-size:.72rem;font-weight:600;margin-left:4px">required</span></label>
      <input type="text" id="project-id" placeholder="my-gcp-project" style="margin-top: 6px;" />
    </div>
  </div>

  <div class="split-layout">
    
    <!-- ── COPY & CAPTIONS ── -->
    <div class="card" id="copy-card">
      <h2>1. Copy & Captions</h2>
      
      <div class="grid-2">
        <div class="field">
          <label for="platform">Platform</label>
          <select id="platform">
            <option value="Instagram" selected>Instagram</option>
            <option value="Twitter">Twitter / X</option>
            <option value="LinkedIn">LinkedIn</option>
            <option value="Facebook">Facebook</option>
            <option value="TikTok">TikTok</option>
          </select>
        </div>
        <div class="field">
          <label for="tone">Tone</label>
          <select id="tone">
            <option value="Casual" selected>Casual & Engaging</option>
            <option value="Professional">Professional</option>
            <option value="Humorous">Humorous</option>
            <option value="Inspirational">Inspirational</option>
            <option value="Educational">Educational</option>
            <option value="Bold">Bold / Provocative</option>
          </select>
        </div>
      </div>

      <div class="field" style="margin-top: 16px;">
        <label for="copy-prompt">Topic / Instructions</label>
        <textarea id="copy-prompt" rows="4" placeholder="e.g. A post announcing our new AI feature. Focus on the time-saving benefits and ease of use."></textarea>
      </div>

      <div class="field" style="margin-top: 16px;">
        <label for="copy-model">Text Model</label>
        <select id="copy-model">
          <option value="gemini-2.5-flash" selected>Gemini 2.5 Flash</option>
          <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
        </select>
      </div>

      <div class="checkbox-field">
        <input type="checkbox" id="use-search" />
        <label for="use-search">Use Google Search to research this topic</label>
      </div>
      <div class="checkbox-field">
        <input type="checkbox" id="include-hashtags" checked />
        <label for="include-hashtags">Research & include top trending hashtags</label>
      </div>

      <button class="btn-primary" id="btn-generate-copy">Generate Copy</button>

      <div id="copy-error" class="error-box"></div>

      <div class="result-section" id="copy-result-section">
        <div class="result-header">
          <h3>Generated Copy</h3>
          <button class="btn-secondary" id="btn-copy-text">Copy to Clipboard</button>
        </div>
        <div class="output-box" id="copy-output"></div>
      </div>
    </div>

    <!-- ── CREATIVE IMAGE GENERATION ── -->
    <div class="card" id="image-card">
      <h2>2. Creative Generation</h2>

      <div class="field">
        <label for="image-prompt">Image Prompt</label>
        <textarea id="image-prompt" rows="3" placeholder="e.g. A futuristic glowing smartphone hovering in a minimalist modern office, photorealistic."></textarea>
      </div>

      <div class="grid-2" style="margin-top: 16px;">
        <div class="field">
          <label for="image-model">Image Model</label>
          <select id="image-model">
            <option value="gemini-3.1-flash-image-preview" selected>Nano Banana 2 (Gemini 3.1 Flash)</option>
            <option value="imagen-3.0-generate-001">Imagen 3</option>
            <option value="imagen-3.0-fast-generate-001">Imagen 3 Fast</option>
          </select>
        </div>
        <div class="field">
          <label for="aspect-ratio">Aspect Ratio</label>
          <select id="aspect-ratio">
            <option value="1:1" selected>1:1 — Square (Instagram/FB)</option>
            <option value="16:9">16:9 — Landscape (Twitter/LinkedIn)</option>
            <option value="9:16">9:16 — Portrait (Reels/TikTok)</option>
            <option value="4:3">4:3 — Classic</option>
            <option value="3:4">3:4 — Classic portrait</option>
          </select>
        </div>
      </div>

      <div class="field" style="margin-top: 16px;">
        <label>Reference Image (Optional)</label>
        <div class="upload-area" id="upload-area">
          <input type="file" id="ref-file" accept="image/*" />
          <div class="upload-placeholder" id="upload-placeholder">
            <div class="upload-icon">🖼</div>
            <div class="upload-text">Click or drag an image here</div>
            <div class="upload-subtext">PNG, JPG, WEBP — up to 10 MB</div>
          </div>
          <div class="ref-preview" id="ref-preview">
            <img id="ref-thumb" src="" alt="Reference" />
            <div class="ref-preview-info">
              <div class="ref-filename" id="ref-filename"></div>
              <div class="field" style="gap:4px">
                <label style="font-size:0.78rem;margin-bottom:2px">Mode</label>
                <div class="mode-toggle">
                  <button id="mode-style" class="active">Style</button>
                  <button id="mode-edit">Edit</button>
                </div>
              </div>
              <button class="btn-remove-ref" id="remove-ref">✕ Remove</button>
            </div>
          </div>
        </div>
        <p class="note" id="mode-note">The model will match the visual style of your reference.</p>
      </div>

      <button class="btn-primary" id="btn-generate-image">Generate Image</button>

      <div id="image-error" class="error-box"></div>

      <div class="result-section" id="image-result-section">
        <div class="result-header">
          <h3>Generated Creative</h3>
        </div>
        <div class="image-grid" id="image-output"></div>
      </div>

    </div>

  </div> <!-- split-layout end -->

</div>
</div>

<script type="module">
  // --- Simple Auth Module ---
  const AUTH = {
    get(k)    { return localStorage.getItem(k); },
    set(k, v) { localStorage.setItem(k, v); },
    clear()   { ['access_token','id_token','refresh_token','token_expiry','project_id','cors_setup'].forEach(k => localStorage.removeItem(k)); },
    migrate() { ['access_token','id_token','project_id','cors_setup'].forEach(k => { const v = sessionStorage.getItem(k); if (v) { localStorage.setItem(k, v); sessionStorage.removeItem(k); } }); },
    async refresh() {
      const rt = AUTH.get('refresh_token');
      if (!rt) return false;
      try {
        const res = await fetch('/api/callback?action=refresh', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ refresh_token: rt })
        });
        if (!res.ok) return false;
        const data = await res.json();
        AUTH.set('access_token', data.access_token);
        if (data.id_token) AUTH.set('id_token', data.id_token);
        AUTH.set('token_expiry', String(Date.now() + (data.expires_in || 3600) * 1000));
        return true;
      } catch { return false; }
    },
    isExpiringSoon() {
      const expiry = Number(AUTH.get('token_expiry') || 0);
      return expiry > 0 && Date.now() > expiry - 5 * 60 * 1000;
    },
  };
  AUTH.migrate();

  // Setup UI bounds
  function getEmail() {
    const t = AUTH.get('id_token'); if (!t) return null;
    try { return JSON.parse(atob(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))).email || null; } catch { return null; }
  }
  document.getElementById('user-email').textContent = getEmail() || 'Signed in';
  document.getElementById('sign-out-btn').addEventListener('click', () => { AUTH.clear(); window.location.href = '/'; });

  (async function() { if (AUTH.isExpiringSoon()) await AUTH.refresh(); setInterval(async () => { if (AUTH.isExpiringSoon()) await AUTH.refresh(); }, 60000); })();

  (async function loadConfig() {
    try {
      const res = await fetch('/api/config');
      const conf = await res.json();
      if (conf.projectId && !document.getElementById('project-id').value) {
        document.getElementById('project-id').value = conf.projectId;
      }
    } catch {}
    const saved = AUTH.get('project_id');
    if (saved && !document.getElementById('project-id').value)
      document.getElementById('project-id').value = saved;
  })();

  // Platform constraint logic
  const platformSel = document.getElementById('platform');
  const aspectSel = document.getElementById('aspect-ratio');
  platformSel.addEventListener('change', () => {
    const p = platformSel.value;
    if (p === 'Instagram' || p === 'Facebook') aspectSel.value = '1:1';
    else if (p === 'Twitter' || p === 'LinkedIn') aspectSel.value = '16:9';
    else if (p === 'TikTok') aspectSel.value = '9:16';
  });

  // --- Copy Generation ---
  const btnGenCopy = document.getElementById('btn-generate-copy');
  const copyOutput = document.getElementById('copy-output');
  const copyResultSec = document.getElementById('copy-result-section');
  const copyError = document.getElementById('copy-error');
  const btnCopyText = document.getElementById('btn-copy-text');

  let rawCopyText = '';

  btnGenCopy.addEventListener('click', async () => {
    const prompt = document.getElementById('copy-prompt').value;
    const projectId = document.getElementById('project-id').value.trim();

    if (!projectId) {
      copyError.textContent = 'Project ID is required.';
      copyError.style.display = 'block';
      return;
    }
    if (!prompt) {
      copyError.textContent = 'Please enter a topic or instruction.';
      copyError.style.display = 'block';
      return;
    }

    copyError.style.display = 'none';
    btnGenCopy.disabled = true;
    btnGenCopy.textContent = 'Generating...';
    
    copyResultSec.classList.add('visible');
    copyOutput.innerHTML = '<span class="cursor"></span>';
    rawCopyText = '';

    try {
      if (AUTH.isExpiringSoon()) await AUTH.refresh();
      const token = AUTH.get('access_token');
      if (!token) throw new Error('Not authenticated');

      const body = {
        prompt,
        projectId,
        platform: platformSel.value,
        tone: document.getElementById('tone').value,
        model: document.getElementById('copy-model').value,
        useSearch: document.getElementById('use-search').checked,
        includeHashtags: document.getElementById('include-hashtags').checked
      };

      const res = await fetch('/api/script?action=social', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(body)
      });

      if (!res.ok) {
        const e = await res.json();
        throw new Error(e.error || `HTTP ${res.status}`);
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value, { stream: true });
        
        for (const line of chunk.split('\n')) {
          if (!line.startsWith('data: ')) continue;
          const jsonStr = line.slice(6).trim();
          if (jsonStr === '[DONE]') continue;
          try {
            const parsed = JSON.parse(jsonStr);
            if (parsed.text) {
              rawCopyText += parsed.text;
              copyOutput.innerHTML = escapeHtml(rawCopyText) + '<span class="cursor"></span>';
            }
          } catch {}
        }
      }
      copyOutput.innerHTML = escapeHtml(rawCopyText);

      // Auto-populate image prompt if it's empty
      const imgPrompt = document.getElementById('image-prompt');
      if (!imgPrompt.value.trim() && rawCopyText.length > 20) {
        imgPrompt.value = rawCopyText.split('\n').find(l => l.trim().length > 10) || '';
      }

    } catch (err) {
      copyError.textContent = err.message;
      copyError.style.display = 'block';
      copyOutput.innerHTML = '';
      copyResultSec.classList.remove('visible');
    } finally {
      btnGenCopy.disabled = false;
      btnGenCopy.textContent = 'Generate Copy';
      AUTH.set('project_id', projectId);
    }
  });

  btnCopyText.addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(rawCopyText);
      btnCopyText.textContent = 'Copied!';
      setTimeout(() => btnCopyText.textContent = 'Copy to Clipboard', 2000);
    } catch {}
  });

  function escapeHtml(str) {
    return str.replace(/[&<>"']/g, m => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
    })[m]);
  }

  // --- Image Generation ---
  let refImageData = null;
  let refImageMime = 'image/jpeg';
  let refMode      = 'style';

  const refFile = document.getElementById('ref-file');
  const uploadPlaceholder = document.getElementById('upload-placeholder');
  const refPreview = document.getElementById('ref-preview');
  const refThumb = document.getElementById('ref-thumb');
  const refFilename = document.getElementById('ref-filename');
  const modeNote = document.getElementById('mode-note');
  const modeStyleBtn = document.getElementById('mode-style');
  const modeEditBtn = document.getElementById('mode-edit');

  refFile.addEventListener('change', () => {
    const file = refFile.files[0];
    if (!file) return;
    if (file.size > 10 * 1024 * 1024) { alert('Reference image must be under 10 MB.'); return; }
    const reader = new FileReader();
    reader.onload = e => {
      refImageData = e.target.result.split(',')[1];
      refImageMime = file.type;
      refThumb.src = e.target.result;
      refFilename.textContent = file.name;
      uploadPlaceholder.style.display = 'none';
      refPreview.style.display = 'flex';
    };
    reader.readAsDataURL(file);
  });

  document.getElementById('remove-ref').addEventListener('click', e => {
    e.preventDefault(); e.stopPropagation();
    refImageData = null; refFile.value = '';
    uploadPlaceholder.style.display = 'block';
    refPreview.style.display = 'none';
  });

  modeStyleBtn.addEventListener('click', e => {
    e.preventDefault(); e.stopPropagation();
    refMode = 'style';
    modeStyleBtn.classList.add('active'); modeEditBtn.classList.remove('active');
    modeNote.textContent = 'The model will match the visual style of your reference.';
  });
  modeEditBtn.addEventListener('click', e => {
    e.preventDefault(); e.stopPropagation();
    refMode = 'edit';
    modeEditBtn.classList.add('active'); modeStyleBtn.classList.remove('active');
    modeNote.textContent = 'The model will edit or augment the exact image you provided.';
  });

  const btnGenImg = document.getElementById('btn-generate-image');
  const imgError = document.getElementById('image-error');
  const imgOutput = document.getElementById('image-output');
  const imgResultSec = document.getElementById('image-result-section');

  btnGenImg.addEventListener('click', async () => {
    const prompt = document.getElementById('image-prompt').value;
    const projectId = document.getElementById('project-id').value.trim();

    if (!projectId) {
      imgError.textContent = 'Project ID is required.';
      imgError.style.display = 'block';
      return;
    }
    if (!prompt) {
      imgError.textContent = 'Please enter an image prompt.';
      imgError.style.display = 'block';
      return;
    }

    imgError.style.display = 'none';
    btnGenImg.disabled = true;
    btnGenImg.textContent = 'Generating...';
    imgResultSec.classList.add('visible');
    imgOutput.innerHTML = '<div style="color:#aaa;padding:20px;">Generating image... This may take a few seconds.</div>';

    try {
      if (AUTH.isExpiringSoon()) await AUTH.refresh();
      const token = AUTH.get('access_token');
      if (!token) throw new Error('Not authenticated');

      const body = {
        prompt,
        projectId,
        model: document.getElementById('image-model').value,
        aspectRatio: document.getElementById('aspect-ratio').value,
        count: 1,
      };

      if (refImageData) {
        body.referenceImageData = refImageData;
        body.referenceImageMime = refImageMime;
        body.referenceMode = refMode;
      }

      const res = await fetch('/api/image', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(body)
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.error?.message || `HTTP ${res.status}`);

      imgOutput.innerHTML = '';
      data.images.forEach((img, idx) => {
        const card = document.createElement('div');
        card.className = 'image-card';
        const url = `data:${img.mimeType};base64,${img.data}`;
        
        card.innerHTML = `
          <img src="${url}" alt="Generated Image" />
          <div class="image-actions">
            <button class="btn-action" onclick="
              const a = document.createElement('a');
              a.href = '${url}';
              a.download = 'creative_${Date.now()}_${idx}.png';
              a.click();
            ">Download</button>
          </div>
        `;
        imgOutput.appendChild(card);
      });

    } catch (err) {
      imgError.textContent = err.message;
      imgError.style.display = 'block';
      imgOutput.innerHTML = '';
      imgResultSec.classList.remove('visible');
    } finally {
      btnGenImg.disabled = false;
      btnGenImg.textContent = 'Generate Image';
    }
  });

</script>
</body>
</html>
